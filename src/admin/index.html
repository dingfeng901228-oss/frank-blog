<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - frank-blog</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0A0A0F;
      --surface: #111119;
      --surface-hover: #1A1A24;
      --border: #1E1E2E;
      --muted: #707080;
      --text: #E8E8EC;
      --accent: #00D4C8;
      --accent-dark: #00A89D;
      --purple: #7C3AED;
      --danger: #ef4444;
      --radius: 8px;
    }
    body { min-height: 100vh; background-color: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', Consolas, monospace; -webkit-font-smoothing: antialiased; line-height: 1.5; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .header h1 { font-size: 20px; font-weight: 500; font-family: Georgia, serif; letter-spacing: -0.01em; }
    .logout { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; font-family: inherit; padding: 4px 8px; border-radius: 4px; transition: color 0.15s; }
    .logout:hover { color: var(--text); background: var(--surface); }

    /* Filter bar */
    .filters { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .tab-group { display: flex; gap: 4px; padding: 3px; background: var(--surface); border-radius: 8px; }
    .tab { padding: 6px 14px; background: none; border: none; border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .tab:hover:not(.active) { color: var(--text); }
    .tab.active { background: var(--accent); color: #0A0A0F; font-weight: 500; }
    .tab.type-post.active { background: var(--accent); }
    .tab.type-note.active { background: var(--purple); color: #fff; }

    /* Title row */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .count-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; background: var(--surface); border-radius: 10px; font-size: 11px; color: var(--muted); margin-left: 8px; }

    /* Post list */
    .post-list { display: flex; flex-direction: column; gap: 6px; }
    .post-item { display: flex; align-items: center; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.15s; gap: 12px; }
    .post-item:hover { background: var(--surface-hover); border-color: #2a2a3e; }
    .post-info { flex: 1; min-width: 0; }
    .post-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
    .post-meta span { display: flex; align-items: center; gap: 4px; }
    .post-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* Buttons */
    .btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-new { background: var(--accent); color: #0A0A0F; font-weight: 500; margin-bottom: 20px; }
    .btn-new:hover { background: var(--accent-dark); }
    .btn-new svg { width: 14px; height: 14px; }
    .btn-edit { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-edit:hover { background: var(--surface-hover); border-color: var(--accent); color: var(--accent); }
    .btn-delete { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .btn-delete:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

    /* Messages */
    .msg { padding: 12px 16px; border-radius: var(--radius); font-size: 12px; margin-bottom: 20px; }
    .msg-error { background: rgba(239, 68, 68, 0.08); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    .msg-success { background: rgba(34, 197, 94, 0.08); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
    .empty { text-align: center; padding: 64px; color: var(--muted); font-size: 13px; }
    .loading { text-align: center; padding: 64px; color: var(--muted); font-size: 13px; }

    @media (max-width: 600px) {
      .post-item { flex-direction: column; align-items: flex-start; }
      .post-actions { width: 100%; }
      .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Admin</h1>
      <button class="logout" id="logoutBtn">Sign Out</button>
    </div>
    <div id="msgBox"></div>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">语言</span>
        <div class="tab-group" id="langTabs"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">类型</span>
        <div class="tab-group" id="typeTabs"></div>
      </div>
    </div>

    <div id="mainContent" class="loading">Loading...</div>
  </div>

  <script>
    var REPO = 'dingfeng901228-oss/frank-blog';
    var BRANCH = 'master';
    var CURRENT_LANG = 'zh';
    var CURRENT_TYPE = 'posts';

    var LANG_NAMES = { ja: '日本語', zh: '中文', en: 'English' };
    var TYPE_NAMES = { posts: '文章', notes: '随笔' };
    var LANG_KEYS = ['zh', 'ja', 'en'];
    var TYPE_KEYS = ['posts', 'notes'];

    var LANG_ICONS = { ja: '🌐', zh: '🇨🇳', en: '🇺🇸' };

    function checkAuth() {
      if (sessionStorage.getItem('ad') !== '1') location.href = '/admin/login.html';
    }
    function apiUrl(path) { return '/api/github?path=' + REPO + '/' + path; }

    function buildTabs(id, keys, labels, current, cls, onClick) {
      var el = document.getElementById(id);
      var html = '';
      keys.forEach(function(k) {
        var label = labels[k] || k;
        var cls2 = cls + (k === current ? ' active' : '');
        html += '<button class="' + cls2 + '" onclick="' + onClick + '(\'' + k + '\')">' + label + '</button>';
      });
      el.innerHTML = html;
    }

    function loadContent() {
      var msgBox = document.getElementById('msgBox');
      msgBox.innerHTML = '';
      var typeLabel = TYPE_NAMES[CURRENT_TYPE] || CURRENT_TYPE;
      var count = 0;
      document.getElementById('mainContent').innerHTML = '<div class="loading">Loading ' + typeLabel + '...</div>';
      fetch(apiUrl('contents/src/content/' + CURRENT_LANG + '/' + CURRENT_TYPE + '?ref=' + BRANCH))
        .then(function(r) { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
        .then(function(files) {
          if (!Array.isArray(files)) throw new Error('Unexpected response');
          var posts = files.filter(function(f) { return f.name.endsWith('.mdx') || f.name.endsWith('.md'); });
          count = posts.length;
          var newUrl = '/admin/new.html?lang=' + CURRENT_LANG + '&type=' + CURRENT_TYPE;
          if (posts.length === 0) {
            document.getElementById('mainContent').innerHTML =
              '<a href="' + newUrl + '" class="btn btn-new">+ New ' + typeLabel + '</a>' +
              '<div class="section-head"><span class="section-title">' + typeLabel + ' <span class="count-badge">0</span></span></div>' +
              '<div class="empty">No ' + CURRENT_TYPE + ' yet. Click "+ New" to create one.</div>';
            return;
          }
          var html = '<a href="' + newUrl + '" class="btn btn-new">+ New ' + typeLabel + '</a>';
          html += '<div class="section-head"><span class="section-title">' + typeLabel + ' <span class="count-badge">' + posts.length + '</span></span></div>';
          html += '<div class="post-list">';
          posts.forEach(function(f) {
            var slug = f.name.replace(/\.(mdx|md)$/, '');
            var dateStr = '';
            try { dateStr = new Date(f.updated_at).toLocaleDateString('ja-JP', {year:'numeric',month:'short',day:'numeric'}); } catch(e) {}
            html += '<div class="post-item">';
            html += '<div class="post-info"><div class="post-title">' + slug + '</div>';
            html += '<div class="post-meta"><span>' + f.name + '</span><span>' + dateStr + '</span></div></div>';
            html += '<div class="post-actions">';
            html += '<a href="/admin/edit.html?lang=' + CURRENT_LANG + '&slug=' + slug + '&type=' + CURRENT_TYPE + '" class="btn btn-edit">Edit</a>';
            html += '<button class="btn btn-delete" onclick="deletePost(\'' + CURRENT_LANG + '\',\'' + slug + '\',\'' + CURRENT_TYPE + '\')">Delete</button>';
            html += '</div></div>';
          });
          html += '</div>';
          document.getElementById('mainContent').innerHTML = html;
        })
        .catch(function(err) {
          document.getElementById('mainContent').innerHTML = '<div class="msg msg-error">Error: ' + err.message + '</div>';
        });
    }

    function switchLang(lang) {
      CURRENT_LANG = lang;
      buildTabs('langTabs', LANG_KEYS, LANG_NAMES, CURRENT_LANG, 'tab', 'switchLang');
      loadContent();
    }
    function switchType(type) {
      CURRENT_TYPE = type;
      var clsPrefix = type === 'notes' ? 'tab type-note' : 'tab type-post';
      buildTabs('typeTabs', TYPE_KEYS, TYPE_NAMES, CURRENT_TYPE, 'tab', 'switchType');
      loadContent();
    }

    function deletePost(lang, slug, type) {
      if (!confirm('Delete "' + slug + '" from all languages (zh/ja/en)? This cannot be undone.')) return;
      document.getElementById('msgBox').innerHTML = '<div class="msg msg-success">Deleting from all languages...</div>';
      var langs = ['ja', 'zh', 'en'];
      Promise.all(langs.map(function(l) {
        return fetch(apiUrl('contents/src/content/' + l + '/' + type + '/' + slug + '.mdx?ref=' + BRANCH))
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(file) {
            if (!file || !file.sha) return Promise.resolve();
            return fetch(apiUrl('contents/src/content/' + l + '/' + type + '/' + slug + '.mdx'), {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: 'Delete ' + type + ': ' + slug + ' (' + l + ')', sha: file.sha, branch: BRANCH })
            });
          })
          .catch(function() { return Promise.resolve(); });
      })).then(function() {
        document.getElementById('msgBox').innerHTML = '<div class="msg msg-success">Deleted from all languages.</div>';
        setTimeout(function() { loadContent(); }, 1500);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', function() {
      sessionStorage.removeItem('ad');
      location.href = '/admin/login.html';
    });

    checkAuth();
    buildTabs('langTabs', LANG_KEYS, LANG_NAMES, CURRENT_LANG, 'tab', 'switchLang');
    buildTabs('typeTabs', TYPE_KEYS, TYPE_NAMES, CURRENT_TYPE, 'tab', 'switchType');
    loadContent();
  </script>
</body>
</html>
