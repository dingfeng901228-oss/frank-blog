<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - frank-blog</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background-color: #0A0A0F; color: #E8E8EC; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; border-bottom: 1px solid #1E1E2E; padding-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 500; font-family: Georgia, serif; }
    .logout { background: none; border: none; color: #707080; cursor: pointer; font-size: 12px; font-family: inherit; }
    .logout:hover { color: #E8E8EC; }
    .top-bar { display: flex; gap: 4px; margin-bottom: 8px; }
    .top-bar .lang-tab { padding: 6px 16px; background: #1E1E2E; border: none; border-radius: 6px; color: #707080; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; }
    .top-bar .lang-tab.active { background: #00D4C8; color: #0A0A0F; font-weight: 500; }
    .top-bar .lang-tab:hover:not(.active) { color: #E8E8EC; }
    .type-tabs { display: flex; gap: 4px; margin-bottom: 32px; }
    .type-tab { padding: 6px 16px; background: #1E1E2E; border: none; border-radius: 6px; color: #707080; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; }
    .type-tab.active { background: #7C3AED; color: #fff; font-weight: 500; }
    .type-tab:hover:not(.active) { color: #E8E8EC; }
    .section-title { font-size: 11px; color: #707080; letter-spacing: 0.1em; margin-bottom: 16px; text-transform: uppercase; }
    .post-list { display: flex; flex-direction: column; gap: 2px; }
    .post-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #111119; border-radius: 8px; transition: background 0.1s; }
    .post-item:hover { background: #1A1A24; }
    .post-info { flex: 1; min-width: 0; }
    .post-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-meta { font-size: 11px; color: #707080; }
    .post-actions { display: flex; gap: 8px; margin-left: 16px; }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; font-family: inherit; transition: opacity 0.15s; text-decoration: none; display: inline-block; }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #00D4C8; color: #0A0A0F; font-weight: 500; }
    .btn-danger { background: #3a1a1a; color: #ef4444; }
    .btn-secondary { background: #1E1E2E; color: #E8E8EC; }
    .new-btn { display: inline-block; margin-bottom: 24px; }
    .empty { text-align: center; padding: 64px; color: #707080; font-size: 13px; }
    .loading { text-align: center; padding: 64px; color: #707080; font-size: 13px; }
    .error-msg { background: #2a1a1a; color: #ef4444; padding: 12px 16px; border-radius: 8px; font-size: 12px; margin-bottom: 24px; }
    .success-msg { background: #1a2a1a; color: #22c55e; padding: 12px 16px; border-radius: 8px; font-size: 12px; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Admin</h1>
      <button class="logout" id="logoutBtn">Sign Out</button>
    </div>
    <div id="errorBox"></div>
    <div id="topBar" class="top-bar"></div>
    <div id="typeTabs" class="type-tabs"></div>
    <div id="mainContent"><div class="loading">Loading...</div></div>
  </div>
  <script>
    var REPO = 'dingfeng901228-oss/frank-blog';
    var BRANCH = 'master';
    var CURRENT_LANG = 'zh';
    var CURRENT_TYPE = 'posts';

    var LANG_NAMES = { ja: '日本語', zh: '中文', en: 'English' };
    var TYPE_NAMES = { posts: '文章', notes: '随笔' };
    var LANG_KEYS = ['zh', 'ja', 'en'];
    var TYPE_KEYS = ['posts', 'notes'];

    function checkAuth() {
      if (sessionStorage.getItem('ad') !== '1') location.href = '/admin/login.html';
    }
    function apiUrl(path) { return '/api/github?path=' + REPO + '/' + path; }
    function renderError(msg) { document.getElementById('errorBox').innerHTML = '<div class="error-msg">' + msg + '</div>'; }
    function renderSuccess(msg) { document.getElementById('errorBox').innerHTML = '<div class="success-msg">' + msg + '</div>'; }
    function clearMsg() { document.getElementById('errorBox').innerHTML = ''; }

    function buildTabs(id, keys, labels, current, activeCls, onClick) {
      var el = document.getElementById(id);
      var html = '';
      keys.forEach(function(k) {
        var label = labels[k] || k;
        var cls = k === current ? activeCls + ' active' : '';
        html += '<button class="' + cls + '" onclick="' + onClick + '(\'' + k + '\')">' + label + '</button>';
      });
      el.innerHTML = html;
    }

    function loadContent() {
      clearMsg();
      var typeLabel = TYPE_NAMES[CURRENT_TYPE] || CURRENT_TYPE;
      var newUrl = '/admin/new.html?lang=' + CURRENT_LANG + '&type=' + CURRENT_TYPE;
      document.getElementById('mainContent').innerHTML = '<div class="loading">Loading ' + typeLabel + '...</div>';
      fetch(apiUrl('contents/src/content/' + CURRENT_LANG + '/' + CURRENT_TYPE + '?ref=' + BRANCH))
        .then(function(r) { if (!r.ok) throw new Error('Failed to load ' + CURRENT_TYPE); return r.json(); })
        .then(function(files) {
          if (!Array.isArray(files)) throw new Error('Unexpected response');
          var posts = files.filter(function(f) { return f.name.endsWith('.mdx') || f.name.endsWith('.md'); });
          if (posts.length === 0) {
            document.getElementById('mainContent').innerHTML =
              '<a href="' + newUrl + '" class="btn btn-primary new-btn">+ New ' + typeLabel + '</a>' +
              '<p class="section-title">' + typeLabel + ' (0)</p><div class="empty">No ' + CURRENT_TYPE + ' yet.</div>';
            return;
          }
          var html = '<a href="' + newUrl + '" class="btn btn-primary new-btn">+ New ' + typeLabel + '</a>';
          html += '<p class="section-title">' + typeLabel + ' (' + posts.length + ')</p><div class="post-list">';
          posts.forEach(function(f) {
            var slug = f.name.replace(/\.(mdx|md)$/, '');
            html += '<div class="post-item">';
            html += '<div class="post-info"><div class="post-title">' + slug + '</div>';
            html += '<div class="post-meta">' + f.name + ' · ' + new Date(f.updated_at).toLocaleDateString() + '</div></div>';
            html += '<div class="post-actions">';
            html += '<a href="/admin/edit.html?lang=' + CURRENT_LANG + '&slug=' + slug + '&type=' + CURRENT_TYPE + '" class="btn btn-secondary">Edit</a>';
            html += '<button class="btn btn-danger" onclick="deletePost(\'' + CURRENT_LANG + '\', \'' + slug + '\', \'' + CURRENT_TYPE + '\')">Delete</button>';
            html += '</div></div>';
          });
          html += '</div>';
          document.getElementById('mainContent').innerHTML = html;
        })
        .catch(function(err) { document.getElementById('mainContent').innerHTML = '<div class="error-msg">Error: ' + err.message + '</div>'; });
    }

    function switchLang(lang) {
      CURRENT_LANG = lang;
      buildTabs('topBar', LANG_KEYS, LANG_NAMES, CURRENT_LANG, 'lang-tab', 'switchLang');
      loadContent();
    }
    function switchType(type) {
      CURRENT_TYPE = type;
      buildTabs('typeTabs', TYPE_KEYS, TYPE_NAMES, CURRENT_TYPE, 'type-tab', 'switchType');
      loadContent();
    }

    function deletePost(lang, slug, type) {
      if (!confirm('Delete "' + slug + '" from all languages (ja/zh/en)? This cannot be undone.')) return;
      renderSuccess('Deleting from all languages...');
      var langs = ['ja', 'zh', 'en'];
      Promise.all(langs.map(function(l) {
        return fetch(apiUrl('contents/src/content/' + l + '/' + type + '/' + slug + '.mdx?ref=' + BRANCH))
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(file) {
            if (!file || !file.sha) return Promise.resolve();
            return fetch(apiUrl('contents/src/content/' + l + '/' + type + '/' + slug + '.mdx'), {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: 'Delete ' + type + ': ' + slug + ' (' + l + ')', sha: file.sha, branch: BRANCH })
            });
          })
          .catch(function() { return Promise.resolve(); });
      })).then(function() {
        renderSuccess('Deleted from all languages.');
        setTimeout(function() { loadContent(); }, 1500);
      });
    }

    document.getElementById('logoutBtn').addEventListener('click', function() {
      sessionStorage.removeItem('ad');
      location.href = '/admin/login.html';
    });

    checkAuth();
    buildTabs('topBar', LANG_KEYS, LANG_NAMES, CURRENT_LANG, 'lang-tab', 'switchLang');
    buildTabs('typeTabs', TYPE_KEYS, TYPE_NAMES, CURRENT_TYPE, 'type-tab', 'switchType');
    loadContent();
  </script>
</body>
</html>
