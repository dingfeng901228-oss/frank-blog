<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - frank-blog</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0A0A0F;
      color: #E8E8EC;
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 320px; padding: 24px; }
    h1 { font-size: 28px; font-weight: 500; text-align: center; margin-bottom: 8px; font-family: Georgia, serif; }
    .sub { text-align: center; margin-bottom: 40px; font-size: 13px; color: #707080; }
    .form { display: flex; flex-direction: column; gap: 16px; }
    input {
      width: 100%; padding: 12px 16px;
      background-color: #1E1E2E;
      border: 1px solid #1E1E2E;
      border-radius: 8px; font-size: 13px;
      color: #E8E8EC; outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #00D4C8; }
    input.bad { border-color: #ef4444; }
    .err { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
    .err.on { display: block; }
    button {
      width: 100%; padding: 12px;
      background-color: #00D4C8;
      color: #0A0A0F; border: none; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-weight: 500;
      font-family: inherit; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin</h1>
    <p class="sub">blog.frank2025.com</p>
    <form id="f">
      <input type="password" id="p" placeholder="Password" autofocus />
      <p class="err" id="e">Incorrect password</p>
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    (function () {
      var PW = 'teihou';
      document.getElementById('f').addEventListener('submit', function (ev) {
        ev.preventDefault();
        if (document.getElementById('p').value === PW) {
          try { sessionStorage.setItem('ad', '1'); } catch (_) {}
          location.href = '/admin/';
        } else {
          document.getElementById('e').classList.add('on');
          document.getElementById('p').classList.add('bad');
          setTimeout(function () {
            document.getElementById('e').classList.remove('on');
            document.getElementById('p').classList.remove('bad');
          }, 2000);
        }
      });
    })();
  </script>
</body>
</html>
